name: Build EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name SRTSpeakerEditor srt_speaker_separator.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRTSpeakerEditor
          path: dist/SRTSpeakerEditor.exe
