name: Build EXE

on:
  push:
    branches:
      - main

  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SRTSpeakerEditor srt_speaker_separator.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRTSpeakerEditor
          path: dist/SRTSpeakerEditor.exe

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SRTSpeakerEditor.exe
